<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <link rel="stylesheet" href="../css/main.css" />
    <title>Product</title>
  </head>
  <body>
    <header id="header"></header>
    <main>
      <section class="head-section">
        <div id="page-header" data-title="Product"></div>
      </section>
      <section class="main-section">
        <div
          class="container mx-auto px-4 grid grid-col-1 md:grid-cols-6 gap-5 my-10"
        >
          <div class="hidden md:block md:col-span-2">
            <div class="mr-6">
              <h2 class="text-3xl font-bold mb-6">Filter by price</h2>
              <div class="relative mb-12">
                <input
                  id="min-range"
                  type="range"
                  min="25"
                  max="100"
                  value="25"
                  class="absolute w-full pointer-events-none appearance-none bg-transparent [&::-webkit-slider-thumb]:pointer-events-auto"
                />
                <input
                  id="max-range"
                  type="range"
                  min="26"
                  max="100"
                  value="100"
                  class="absolute w-full pointer-events-none appearance-none bg-transparent [&::-webkit-slider-thumb]:pointer-events-auto"
                />
              </div>
              <div class="flex justify-between items-center mb-4">
                <div class="text-center">
                  <input
                    id="min-price"
                    type="text"
                    value="$25"
                    class="w-20 text-center border border-gray-400 py-2 bg-white"
                  />
                  <p class="text-gray-500 mt-2">Min. Price</p>
                </div>
                <div class="text-center">
                  <input
                    id="max-price"
                    type="text"
                    value="$100"
                    class="w-20 text-center border border-gray-400 py-2 bg-white"
                  />
                  <p class="text-gray-500 mt-2">Max. Price</p>
                </div>
              </div>
            </div>
            <div class="my-10">
              <h1 class="text-2xl font-bold mb-5">Top rated products</h1>
              <div class="flex flex-col gap-5">
                <div class="product-mini-card" data-id="2"></div>
                <div class="product-mini-card" data-id="1"></div>
                <div class="product-mini-card" data-id="3"></div>
                <div class="product-mini-card" data-id="4"></div>
                <div class="product-mini-card" data-id="5"></div>
              </div>
            </div>
            <div id="cloth-technologies"></div>
          </div>
          <div
            id="products-container"
            class="grid grid-cols-1 md:grid-cols-3 col-span-4 gap-7"
          >
            <div class="product-card" data-id="1"></div>
            <div class="product-card" data-id="7"></div>
            <div class="product-card" data-id="3"></div>
            <div class="product-card" data-id="8"></div>
            <div class="product-card" data-id="5"></div>
            <div class="product-card" data-id="2"></div>
            <div class="product-card" data-id="6"></div>
            <div class="product-card" data-id="4"></div>
            <div class="product-card" data-id="9"></div>
          </div>
        </div>
      </section>
    </main>
    <footer
      id="footer"
      class="mt-10 md:mt-20 bg-gray-100 pt-10 md:pt-20 pb-10"
    ></footer>
    <script type="module" src="../js/main.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <title>News</title>
  </head>
  <body>
    <header id="header"></header>
    <div id="login-modal-section" class="hidden"></div>
    <div id="search-modal-section" class="hidden"></div>
    <div class="head-section">
      <div id="page-header" data-title="News"></div>
    </div>
    <main>
      <section class="blog-product-section my-10 md:my-20">
        <div class="container mx-auto px-4">
          <div
            class="grid grid-cols-1 lg:grid-cols-3 gap-5 md:gap-10 justify-center items-center mt-15"
          >
            <div class="blog-article" data-id="1"></div>
            <div class="blog-article" data-id="2"></div>
            <div class="blog-article" data-id="3"></div>
            <div class="blog-article" data-id="4"></div>
            <div class="blog-article" data-id="5"></div>
            <div class="blog-article" data-id="6"></div>
          </div>
        </div>
      </section>
    </main>
    <footer id="footer" class="bg-gray-100 pt-10 md:pt-20 pb-10"></footer>
    <script type="module" src="../js/main.js"></script>
  </body>
</html>
